<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Layout (Default)</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/fd67135b48.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div class="header__banner">
        <div class="header__banner--container">
          <div class="banner__left">
            <a href="#" class="">FOR BUSINESSES</a>
            <span class="">/</span>
            <a href="#" class="">FOR INDIVIDUALS</a>
          </div>
          <div class="banner__right">
            <a href="#" class="banner__login">CLIENT LOGIN</a>
            <a href="#" class="banner__contact">Contact</a>
            <a href="" class="banner__search"></a>
          </div>
        </div>
      </div>
      <nav>
        <div class="nav__container">
          <figure class="nav__logo--wrapper">
            <img
              class="nav__logo--img"
              src="/assets/LICLogo2025FullWhite.png"
              alt="Company Logo"
            />
          </figure>
          <ul class="nav__list">
            <li class="nav__list--item">
              About <i class="fa-solid fa-chevron-down"></i>
            </li>
            <li class="nav__list--item">
              Services <i class="fa-solid fa-chevron-down"></i>
            </li>
            <li class="nav__list--item">
              Work <i class="fa-solid fa-chevron-down"></i>
            </li>
            <li class="nav__list--item">
              Solutions <i class="fa-solid fa-chevron-down"></i>
            </li>
            <li class="nav__list--item">
              Insights <i class="fa-solid fa-chevron-down"></i>
            </li>
            <li class="nav__list--item">
              Contact <i class="fa-solid fa-chevron-down"></i>
            </li>
          </ul>
        </div>
      </nav>
      <div class="header__hero">
        <video
          class="videom"
          autoplay
          muted
          playsinline
          loop
          src="/assets/LICskylinefootage.mp4"
        ></video>
        <div class="hero">
          <div class="hero__panels">
            <div class="panel active"></div>
            <div class="panel"></div>
            <div class="panel"></div>
            <div class="panel"></div>
          </div>
          <div class="hero__container">
            <!-- tab for l8r hex# 42224-- -->
            <h1 class="hero__title">
              Disciplined design<br />for your website.
            </h1>
            <div class="hero__booking">
              <a href="#"> Book a Call With Us</a>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
